<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
        <title>CicloRut - Estacionamiento inteligente</title>
        <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>🚲 CicloRut</h1>
            <div class="messages-area" id="globalMessages">
                <div class="sub-message">✨ Escanea tu carnet para empezar</div>
            </div>
            
            <div id="globalScannerArea" class="scanner-global">
                <div id="qr-reader"></div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button id="stopScanBtn" style="background:#4f5e4a;">❌ Detener cámara</button>
                    <button id="restartCameraBtn" style="background:#2c6e3c;">🔄 Reiniciar cámara</button>
                </div>
            </div>

            <div class="candados-grid" id="candadosGrid"></div>

            <div class="log-area" id="logPanel">
                📍 Historial:<br>
                • Sistema listo. Para usar la cámara, haz clic en "Escanear QR" en cualquier estacionamiento.
            </div>
            <div style="text-align:center; margin-top: 1rem;">
                <button class="btn-warning" onclick="resetearTodo()">🗑️ Borrar todos los datos</button>
            </div>
            <div class="footer">
                📌 El QR debe contener: RUN, serial y MRZ.<br>
                v2.4.1
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
